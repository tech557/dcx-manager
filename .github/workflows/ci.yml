name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  requirements:
    name: Requirements graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: req:validate
        run: npm run req:validate

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: verify
        run: bash scripts/verify.sh
      - name: architecture
        run: npm run validate:architecture
      - name: test
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [requirements, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: build
        run: npm run build
