name: CI

# RG-R3 (cicd-release-governance): extended to cover the integration/staging/main branch model
# instead of main-only — required checks for branch protection on all three (see
# docs/plans/active/cicd-release-governance/output/RG-R3-github-ci.md).
on:
  push:
    branches: [main, staging, integration]
  pull_request:
    branches: [main, staging, integration]

jobs:
  requirements:
    name: Requirements graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: req:validate
        run: npm run req:validate

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: verify
        run: bash scripts/verify.sh
      - name: architecture
        run: npm run validate:architecture
      - name: test
        run: npm run test
      - name: release registry validate
        run: bash scripts/release/validate-release-registry.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [requirements, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: build
        run: npm run build
