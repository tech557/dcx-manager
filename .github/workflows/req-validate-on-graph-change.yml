name: Requirements — graph change guard

on:
  push:
    paths:
      - 'docs/product/requirements/graph/**'
  pull_request:
    paths:
      - 'docs/product/requirements/graph/**'

jobs:
  validate:
    name: req:validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run req:validate
